server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Imágenes y fuentes: rara vez cambian → caché largo
    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # JS/CSS/HTML/JSON: se revalidan siempre (evita versiones viejas tras un deploy)
    location ~* \.(js|css|html|json)$ {
        add_header Cache-Control "no-cache";
    }

    # El service worker nunca se cachea
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # App de una sola página: cualquier ruta → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Compresión
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
